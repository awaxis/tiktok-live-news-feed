<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #ticker {
            position: absolute;
            left: 0;
            bottom: 20px;
            white-space: nowrap;
            font-size: 60px;
            font-family: Arial;
            color: white;
            animation: scroll 45s linear infinite;
        }

        @keyframes scroll {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100vw);
            }
        }
    </style>
</head>

<body>
    <div id="ticker">Chargement...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on("message-update", (data) => {
            const el = document.getElementById("ticker");

            if (el.innerText !== data.text) {
                el.innerText = data.text;
            }
        });

        socket.on("config-update", (config) => {
            const el = document.getElementById("ticker");
            if (config.speed) el.style.animationDuration = `${config.speed}s`;
            if (config.fontSize) el.style.fontSize = `${config.fontSize}px`;
            if (config.color) el.style.color = config.color;
            if (config.fontFamily) el.style.fontFamily = config.fontFamily;
            if (config.backgroundColor !== undefined) document.body.style.backgroundColor = config.backgroundColor;
            if (config.textShadow !== undefined) el.style.textShadow = config.textShadow;
        });
    </script>

</body>

</html>
